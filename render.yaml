# Render Blueprint — configures the webintel.dev static site.
# Applies RFC 8288 Link headers on every response and correct Content-Type
# for extension-less well-known resources. Markdown content negotiation
# happens in the Cloudflare Worker in front of the origin (see
# cloudflare/worker.js) because Render's static-site routing can't vary
# on the Accept header.
services:
  - type: web
    name: webintel-landing
    runtime: static
    staticPublishPath: ./
    buildCommand: ""
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Link
        value: </.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json", </openapi.yaml>; rel="service-desc"; type="application/vnd.oai.openapi", </#docs>; rel="service-doc"; type="text/html", </.well-known/mcp/server-card.json>; rel="mcp-server-card"; type="application/json", </.well-known/agent-skills/index.json>; rel="agent-skills"; type="application/json", </sitemap.xml>; rel="sitemap"; type="application/xml"
      - path: /*
        name: Vary
        value: Accept
      - path: /.well-known/api-catalog
        name: Content-Type
        value: application/linkset+json; charset=utf-8
      - path: /.well-known/mcp/server-card.json
        name: Content-Type
        value: application/json; charset=utf-8
      - path: /.well-known/agent-skills/index.json
        name: Content-Type
        value: application/json; charset=utf-8
      - path: /openapi.yaml
        name: Content-Type
        value: application/vnd.oai.openapi; charset=utf-8
      - path: /index.md
        name: Content-Type
        value: text/markdown; charset=utf-8
      - path: /robots.txt
        name: Content-Type
        value: text/plain; charset=utf-8
      - path: /sitemap.xml
        name: Content-Type
        value: application/xml; charset=utf-8
    routes:
      - type: rewrite
        source: /llms.txt
        destination: /index.md
